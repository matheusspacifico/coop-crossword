<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Coop Crossword</title>
  <rect width="64" height="64" rx="14" fill="#FAF1E6"/>
  <g stroke="#2D1B16" stroke-width="2.5" stroke-linejoin="round">
    <rect x="8" y="8" width="16" height="16" fill="#FFFDF7"/>
    <rect x="24" y="8" width="16" height="16" fill="#E07856"/>
    <rect x="40" y="8" width="16" height="16" fill="#FFFDF7"/>
    <rect x="8" y="24" width="16" height="16" fill="#FFFDF7"/>
    <rect x="24" y="24" width="16" height="16" fill="#FFFDF7"/>
    <rect x="40" y="24" width="16" height="16" fill="#2D1B16"/>
    <rect x="8" y="40" width="16" height="16" fill="#2D1B16"/>
    <rect x="24" y="40" width="16" height="16" fill="#FFFDF7"/>
    <rect x="40" y="40" width="16" height="16" fill="#B5C99A"/>
  </g>
</svg>
